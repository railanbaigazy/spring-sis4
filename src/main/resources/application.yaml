spring:
  application:
    name: sis4
  datasource:
    url: jdbc:postgresql://localhost:5432/sis4_db
    username: postgres
    password: postgres

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration

logging:
  level:
    root: INFO
    kz.kbtu.sis4: DEBUG
    org.springframework.web: INFO
